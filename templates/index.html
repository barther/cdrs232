<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#0a0a0a">
    <title>TASCAM CD-400U</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/static/icons/icon-512.png">
    <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --black: #0a0a0a;
            --surface: #151515;
            --surface-raised: #1e1e1e;
            --surface-border: #2a2a2a;
            --lcd-bg: #0c1a0a;
            --lcd-glow: #1a2e14;
            --amber: #f0a000;
            --amber-dim: #3a2800;
            --amber-bright: #ffb820;
            --green: #22cc66;
            --green-dim: #0a3018;
            --red: #dd3030;
            --red-dim: #2a0808;
            --text: #cccccc;
            --text-dim: #777777;
            --btn-surface: #1a1a1a;
            --btn-border: #333333;
            --btn-hover: #252525;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--black);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        .unit {
            max-width: 480px;
            margin: 0 auto;
            padding: 12px;
        }

        /* ── FACEPLATE HEADER ── */
        .faceplate-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            margin-bottom: 8px;
        }

        .brand {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .model {
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 2px;
            color: var(--text-dim);
        }

        .conn-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--red-dim);
            border: 1px solid var(--red);
            transition: all 0.3s;
        }

        .conn-dot.on {
            background: var(--green);
            border-color: var(--green);
            box-shadow: 0 0 8px var(--green);
        }

        /* ── LCD DISPLAY ── */
        .lcd {
            background: var(--lcd-bg);
            border: 2px solid #1a2a18;
            border-radius: 6px;
            padding: 20px 16px 16px;
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
        }

        .lcd::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.08) 2px,
                rgba(0,0,0,0.08) 4px
            );
            pointer-events: none;
        }

        .lcd-main {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 20px;
            margin-bottom: 12px;
        }

        .lcd-track {
            font-family: 'Orbitron', sans-serif;
            font-size: 64px;
            font-weight: 900;
            color: var(--amber);
            line-height: 1;
            text-shadow: 0 0 20px rgba(240, 160, 0, 0.4);
            min-width: 100px;
            text-align: right;
        }

        .lcd-time {
            font-family: 'Orbitron', sans-serif;
            font-size: 36px;
            font-weight: 700;
            color: var(--amber);
            line-height: 1;
            text-shadow: 0 0 15px rgba(240, 160, 0, 0.3);
        }

        .lcd-status {
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 3px;
            color: var(--amber);
            text-transform: uppercase;
            margin-bottom: 14px;
            opacity: 0.9;
        }

        .lcd-info {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #1a2a18;
            padding-top: 10px;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .lcd-info-item {
            text-align: center;
            flex: 1;
        }

        .lcd-info-label {
            color: #4a7a40;
            font-weight: 300;
            margin-bottom: 2px;
        }

        .lcd-info-value {
            color: var(--amber);
            font-weight: 500;
            opacity: 0.8;
        }

        /* ── TRANSPORT CONTROLS ── */
        .transport {
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 8px;
        }

        .transport-primary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .transport-secondary {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }

        .transport-tertiary {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }

        .t-btn {
            background: var(--btn-surface);
            border: 1px solid var(--btn-border);
            border-radius: 4px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 16px 8px;
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            user-select: none;
            -webkit-user-select: none;
        }

        .t-btn:active:not(:disabled) {
            transform: scale(0.97);
            background: var(--btn-hover);
        }

        .t-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .t-btn svg { flex-shrink: 0; }

        .t-btn--play {
            padding: 24px 8px;
            font-size: 15px;
            font-weight: 700;
            color: var(--green);
            border-color: var(--green-dim);
        }

        .t-btn--play:active:not(:disabled) {
            background: var(--green-dim);
        }

        .t-btn--stop {
            padding: 24px 8px;
            font-size: 15px;
            font-weight: 700;
            color: var(--red);
            border-color: var(--red-dim);
        }

        .t-btn--stop:active:not(:disabled) {
            background: var(--red-dim);
        }

        .t-btn--eject {
            color: var(--text-dim);
            padding: 12px 8px;
            font-size: 12px;
        }

        .t-btn--hold {
            position: relative;
        }

        .t-btn--hold::after {
            content: 'HOLD';
            position: absolute;
            bottom: 3px;
            right: 5px;
            font-size: 6px;
            letter-spacing: 1px;
            color: var(--text-dim);
            opacity: 0.6;
        }

        /* ── TRACK GRID ── */
        .track-section {
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 8px;
        }

        .section-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 3px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .track-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }

        .track-pill {
            background: var(--btn-surface);
            border: 1px solid var(--btn-border);
            border-radius: 4px;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 500;
            padding: 12px 4px;
            cursor: pointer;
            text-align: center;
            transition: all 0.1s;
        }

        .track-pill:active { transform: scale(0.95); }

        .track-pill.active {
            background: var(--amber-dim);
            border-color: var(--amber);
            color: var(--amber-bright);
            font-weight: 700;
            box-shadow: 0 0 8px rgba(240, 160, 0, 0.15);
        }

        .track-pill:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        /* ── COLLAPSIBLE SECTIONS ── */
        .collapse-header {
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: 6px;
            padding: 12px 14px;
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.15s;
        }

        .collapse-header:active { background: var(--surface-raised); }

        .collapse-header .section-label { margin-bottom: 0; }

        .collapse-chevron {
            color: var(--text-dim);
            font-size: 10px;
            transition: transform 0.2s;
        }

        .collapse-body {
            display: none;
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-top: none;
            border-radius: 0 0 6px 6px;
            padding: 12px 14px;
            margin-top: -14px;
            margin-bottom: 8px;
        }

        .collapse-body.open { display: block; }
        .collapse-header.open { border-radius: 6px 6px 0 0; margin-bottom: 0; }
        .collapse-header.open .collapse-chevron { transform: rotate(180deg); }

        /* ── MODE / SOURCE BUTTONS ── */
        .pill-row {
            display: grid;
            gap: 6px;
        }

        .pill-row--3 { grid-template-columns: repeat(3, 1fr); }
        .pill-row--4 { grid-template-columns: repeat(4, 1fr); }

        .pill-btn {
            background: var(--btn-surface);
            border: 1px solid var(--btn-border);
            border-radius: 4px;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 12px 6px;
            cursor: pointer;
            text-align: center;
            transition: all 0.1s;
        }

        .pill-btn.active {
            background: var(--amber-dim);
            border-color: var(--amber);
            color: var(--amber);
        }

        /* ── TUNER SECTION ── */
        .tuner-section {
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 8px;
            display: none;
        }

        .tuner-section.show { display: block; }

        .tuner-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }

        .preset-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
        }

        /* ── CONNECTION SETTINGS ── */
        .conn-input {
            width: 100%;
            background: var(--black);
            border: 1px solid var(--btn-border);
            border-radius: 4px;
            padding: 10px 12px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .conn-input:focus {
            outline: none;
            border-color: var(--amber);
        }

        .conn-label {
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .btn-connect {
            width: 100%;
            background: var(--green-dim);
            border: 1px solid var(--green);
            border-radius: 4px;
            color: var(--green);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 14px;
            cursor: pointer;
            margin-top: 4px;
            transition: all 0.15s;
        }

        .btn-connect:active {
            background: var(--green);
            color: var(--black);
        }

        /* ── ERROR BANNER ── */
        .error-banner {
            background: var(--red-dim);
            border: 1px solid var(--red);
            border-radius: 4px;
            padding: 8px 12px;
            margin-bottom: 8px;
            font-size: 10px;
            letter-spacing: 1px;
            color: var(--red);
            text-transform: uppercase;
            display: none;
        }

        .error-banner.show { display: block; }

        /* ── FOOTER ── */
        .footer {
            text-align: center;
            padding: 16px 0 24px;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--text-dim);
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 380px) {
            .lcd-track { font-size: 48px; }
            .lcd-time { font-size: 28px; }
            .track-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>
    <div class="unit">

        <!-- FACEPLATE HEADER -->
        <div class="faceplate-header">
            <div>
                <div class="brand">TASCAM</div>
                <div class="model">CD-400U</div>
            </div>
            <div class="conn-dot" id="connDot" title="Connection status"></div>
        </div>

        <!-- LCD DISPLAY -->
        <div class="lcd">
            <div class="lcd-main">
                <div class="lcd-track" id="trackNumber">--</div>
                <div class="lcd-time" id="timeDisplay">00:00</div>
            </div>
            <div class="lcd-status" id="mechaStatus">NO MEDIA</div>
            <div class="lcd-info">
                <div class="lcd-info-item">
                    <div class="lcd-info-label" id="srcLabel">SOURCE</div>
                    <div class="lcd-info-value" id="deviceName">CD</div>
                </div>
                <div class="lcd-info-item">
                    <div class="lcd-info-label" id="trkLabel">TRACKS</div>
                    <div class="lcd-info-value" id="totalTracks">--</div>
                </div>
                <div class="lcd-info-item">
                    <div class="lcd-info-label" id="mediaLabel">MEDIA</div>
                    <div class="lcd-info-value" id="mediaType">--</div>
                </div>
            </div>
        </div>

        <!-- ERROR / CAUTION BANNER -->
        <div class="error-banner" id="errorBanner"></div>

        <!-- TRANSPORT -->
        <div class="transport">
            <div class="transport-primary">
                <button class="t-btn t-btn--play" id="btnPlay" disabled>
                    <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M3 2l10 6-10 6V2z"/></svg>
                    PLAY
                </button>
                <button class="t-btn t-btn--stop" id="btnStop" disabled>
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="3" y="3" width="10" height="10"/></svg>
                    STOP
                </button>
            </div>
            <div class="transport-secondary">
                <button class="t-btn" id="btnPrev" disabled>
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="3" width="2" height="10"/><path d="M12 3L6 8l6 5V3z"/></svg>
                </button>
                <button class="t-btn t-btn--hold" id="btnRew" disabled>
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M9 3L3 8l6 5V3z"/><path d="M15 3L9 8l6 5V3z"/></svg>
                </button>
                <button class="t-btn t-btn--hold" id="btnFwd" disabled>
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M1 3l6 5-6 5V3z"/><path d="M7 3l6 5-6 5V3z"/></svg>
                </button>
                <button class="t-btn" id="btnNext" disabled>
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4 3l6 5-6 5V3z"/><rect x="12" y="3" width="2" height="10"/></svg>
                </button>
            </div>
            <div class="transport-tertiary">
                <button class="t-btn t-btn--eject" id="btnEject" disabled>
                    <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2L3 8h10L8 2z"/><rect x="3" y="10" width="10" height="2"/></svg>
                    EJECT
                </button>
            </div>
        </div>

        <!-- TRACK GRID -->
        <div class="track-section" id="trackSection" style="display:none;">
            <div class="section-label">TRACKS</div>
            <div class="track-grid" id="trackGrid"></div>
        </div>

        <!-- TUNER CONTROLS -->
        <div class="tuner-section" id="tunerControls">
            <div class="section-label">TUNER</div>
            <div class="tuner-grid">
                <button class="t-btn" id="btnTuneDown" disabled>
                    <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M11 3L5 8l6 5V3z"/></svg>
                    TUNE ▾
                </button>
                <button class="t-btn" id="btnTuneUp" disabled>
                    TUNE ▴
                    <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M5 3l6 5-6 5V3z"/></svg>
                </button>
                <button class="t-btn" id="btnSeekDown" disabled>
                    <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M9 3L3 8l6 5V3z"/><path d="M15 3L9 8l6 5V3z"/></svg>
                    SEEK
                </button>
                <button class="t-btn" id="btnSeekUp" disabled>
                    SEEK
                    <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M1 3l6 5-6 5V3z"/><path d="M7 3l6 5-6 5V3z"/></svg>
                </button>
            </div>
            <div class="section-label">PRESETS</div>
            <div class="preset-row">
                <button class="pill-btn" id="preset1" disabled>1</button>
                <button class="pill-btn" id="preset2" disabled>2</button>
                <button class="pill-btn" id="preset3" disabled>3</button>
                <button class="pill-btn" id="preset4" disabled>4</button>
                <button class="pill-btn" id="preset5" disabled>5</button>
                <button class="pill-btn" id="preset6" disabled>6</button>
            </div>
        </div>

        <!-- SOURCE SELECTION (collapsible) -->
        <div class="collapse-header" id="sourceToggle">
            <span class="section-label">SOURCE</span>
            <span class="collapse-chevron">▾</span>
        </div>
        <div class="collapse-body" id="sourceBody">
            <div class="pill-row pill-row--4">
                <button class="pill-btn active" data-device="cd">CD</button>
                <button class="pill-btn" data-device="usb">USB</button>
                <button class="pill-btn" data-device="sd">SD</button>
                <button class="pill-btn" data-device="bluetooth">BT</button>
            </div>
            <div class="pill-row pill-row--3" style="margin-top:6px;">
                <button class="pill-btn" data-device="fm">FM</button>
                <button class="pill-btn" data-device="am">AM</button>
                <button class="pill-btn" data-device="aux">AUX</button>
            </div>
        </div>

        <!-- PLAYBACK MODE (collapsible) -->
        <div class="collapse-header" id="modeToggle">
            <span class="section-label">PLAYBACK MODE</span>
            <span class="collapse-chevron">▾</span>
        </div>
        <div class="collapse-body" id="modeBody">
            <div class="pill-row pill-row--3">
                <button class="pill-btn active" data-mode="continuous">CONT</button>
                <button class="pill-btn" data-mode="single">SINGLE</button>
                <button class="pill-btn" data-mode="random">RANDOM</button>
            </div>
        </div>

        <!-- CONNECTION SETTINGS (collapsible) -->
        <div class="collapse-header" id="connToggle">
            <span class="section-label">CONNECTION</span>
            <span class="collapse-chevron">▾</span>
        </div>
        <div class="collapse-body" id="connBody">
            <div class="conn-label">SERIAL PORT</div>
            <input type="text" class="conn-input" id="serialPort" value="/dev/ttyUSB0">
            <div class="conn-label">BAUD RATE</div>
            <select class="conn-input" id="baudRate">
                <option value="4800">4800</option>
                <option value="9600" selected>9600</option>
                <option value="19200">19200</option>
                <option value="38400">38400</option>
                <option value="57600">57600</option>
            </select>
            <button class="btn-connect" id="btnConnect">CONNECT</button>
        </div>

        <div class="footer">TASCAM CD-400U · RS-232C · RPI</div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        // ── Socket.IO ──
        const socket = io();

        // ── DOM refs ──
        const $ = id => document.getElementById(id);
        const connDot = $('connDot');
        const trackNumber = $('trackNumber');
        const timeDisplay = $('timeDisplay');
        const mechaStatus = $('mechaStatus');
        const totalTracksEl = $('totalTracks');
        const mediaTypeEl = $('mediaType');
        const deviceNameEl = $('deviceName');
        const trackGrid = $('trackGrid');
        const trackSection = $('trackSection');
        const errorBanner = $('errorBanner');
        const tunerControls = $('tunerControls');

        const btnPlay = $('btnPlay');
        const btnStop = $('btnStop');
        const btnEject = $('btnEject');
        const btnPrev = $('btnPrev');
        const btnNext = $('btnNext');
        const btnRew = $('btnRew');
        const btnFwd = $('btnFwd');

        const btnTuneUp = $('btnTuneUp');
        const btnTuneDown = $('btnTuneDown');
        const btnSeekUp = $('btnSeekUp');
        const btnSeekDown = $('btnSeekDown');

        const modeBtns = document.querySelectorAll('[data-mode]');
        const deviceBtns = document.querySelectorAll('[data-device]');

        let connected = false;
        let isTuner = false;
        let currentMechaStatus = 'unknown';
        let currentTotalTracks = 0;

        // ── Collapsible sections ──
        document.querySelectorAll('.collapse-header').forEach(hdr => {
            hdr.addEventListener('click', () => {
                const bodyId = hdr.id.replace('Toggle', 'Body');
                const body = $(bodyId);
                hdr.classList.toggle('open');
                body.classList.toggle('open');
            });
        });

        // ── Connection ──
        $('btnConnect').addEventListener('click', async () => {
            try {
                const res = await fetch('/api/connect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        port: $('serialPort').value,
                        baudrate: parseInt($('baudRate').value)
                    })
                });
                const data = await res.json();
                if (data.success) {
                    connected = true;
                    updateConnection(true);
                    $('connToggle').classList.remove('open');
                    $('connBody').classList.remove('open');
                } else {
                    alert('Connection failed: ' + data.message);
                }
            } catch (e) {
                alert('Connection error: ' + e.message);
            }
        });

        // ── Transport ──
        btnPlay.addEventListener('click', () => {
            if (['play', 'search_forward', 'search_backward'].includes(currentMechaStatus)) {
                sendCmd('/api/pause');
            } else {
                sendCmd('/api/play');
            }
        });

        btnStop.addEventListener('click', () => sendCmd('/api/stop'));
        btnEject.addEventListener('click', () => sendCmd('/api/eject'));
        btnPrev.addEventListener('click', () => sendCmd('/api/previous'));
        btnNext.addEventListener('click', () => sendCmd('/api/next'));

        // Hold-to-seek
        function bindHold(btn, endpoint) {
            const start = (e) => { e.preventDefault(); sendCmdData(endpoint.start, endpoint.data); };
            const stop = () => sendCmd(endpoint.stop);
            btn.addEventListener('mousedown', start);
            btn.addEventListener('mouseup', stop);
            btn.addEventListener('mouseleave', stop);
            btn.addEventListener('touchstart', start, { passive: false });
            btn.addEventListener('touchend', stop);
        }

        bindHold(btnRew, {
            start: '/api/search/start',
            data: { forward: false, high_speed: false },
            stop: '/api/search/stop'
        });
        bindHold(btnFwd, {
            start: '/api/search/start',
            data: { forward: true, high_speed: false },
            stop: '/api/search/stop'
        });

        // ── Mode / Device selection ──
        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                sendCmd(`/api/mode/${btn.dataset.mode}`);
                modeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        deviceBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                sendCmd(`/api/device/${btn.dataset.device}`);
                deviceBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        // ── Tuner ──
        btnTuneUp.addEventListener('click', () => sendCmd('/api/tuner/frequency/up'));
        btnTuneDown.addEventListener('click', () => sendCmd('/api/tuner/frequency/down'));
        btnSeekUp.addEventListener('click', () => sendCmd('/api/tuner/seek/up'));
        btnSeekDown.addEventListener('click', () => sendCmd('/api/tuner/seek/down'));

        [1,2,3,4,5,6].forEach(n => {
            $(`preset${n}`).addEventListener('click', () => sendCmd(`/api/tuner/preset/${n}`));
        });

        // ── Track grid ──
        function populateTrackGrid(total) {
            if (total === currentTotalTracks) return;
            currentTotalTracks = total;
            trackGrid.innerHTML = '';

            if (total === 0) { trackSection.style.display = 'none'; return; }
            trackSection.style.display = 'block';

            for (let i = 1; i <= total; i++) {
                const btn = document.createElement('button');
                btn.className = 'track-pill';
                btn.textContent = i;
                btn.dataset.track = i;
                btn.addEventListener('click', () => sendCmd(`/api/track/${i}`));
                trackGrid.appendChild(btn);
            }
        }

        function highlightTrack(n) {
            trackGrid.querySelectorAll('.track-pill').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.track) === n);
            });
        }

        // ── API helpers ──
        async function sendCmd(endpoint) {
            if (!connected) return;
            try { await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' } }); }
            catch (e) { console.error('Cmd error:', e); }
        }

        async function sendCmdData(endpoint, data) {
            if (!connected) return;
            try { await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) }); }
            catch (e) { console.error('Cmd error:', e); }
        }

        // ── UI updates ──
        function updateConnection(on) {
            connected = on;
            connDot.classList.toggle('on', on);
            $('btnConnect').textContent = on ? 'DISCONNECT' : 'CONNECT';
            [btnPlay, btnStop, btnEject, btnPrev, btnNext, btnRew, btnFwd].forEach(b => b.disabled = !on);
            trackGrid.querySelectorAll('.track-pill').forEach(b => b.disabled = !on);

            if (isTuner) {
                [btnTuneUp, btnTuneDown, btnSeekUp, btnSeekDown].forEach(b => b.disabled = !on);
                [1,2,3,4,5,6].forEach(n => $(`preset${n}`).disabled = !on);
            }
        }

        const STATUS_MAP = {
            'no_media': 'NO MEDIA',
            'ejecting': 'EJECTING',
            'stop': 'STOPPED',
            'play': '► PLAYING',
            'ready': '▮▮ PAUSED',
            'search_forward': '►► SEARCH',
            'search_backward': '◄◄ SEARCH',
            'unknown': '---'
        };

        function updateDisplay(s) {
            // Track & time
            trackNumber.textContent = s.track_number > 0 ? String(s.track_number).padStart(2, '0') : '--';
            timeDisplay.textContent = s.time_elapsed || '00:00';

            // Status
            mechaStatus.textContent = STATUS_MAP[s.mecha_status] || '---';
            currentMechaStatus = s.mecha_status;

            // Smart play button
            const isPlaying = ['play', 'search_forward', 'search_backward'].includes(s.mecha_status);
            btnPlay.innerHTML = isPlaying
                ? '<svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><rect x="3" y="3" width="3" height="10"/><rect x="10" y="3" width="3" height="10"/></svg> PAUSE'
                : '<svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M3 2l10 6-10 6V2z"/></svg> PLAY';

            // Disc info
            totalTracksEl.textContent = s.total_tracks > 0 ? s.total_tracks : '--';
            if (s.media_type && s.media_type !== 'unknown') {
                mediaTypeEl.textContent = s.media_type.replace('CD-DA/', '').replace('CD-ROM/', 'Data');
            } else {
                mediaTypeEl.textContent = '--';
            }
            if (s.device_name) deviceNameEl.textContent = s.device_name;

            // Track grid
            if (s.total_tracks > 0) { populateTrackGrid(s.total_tracks); }
            else { populateTrackGrid(0); }
            if (s.track_number > 0) highlightTrack(s.track_number);

            // Tuner context switch
            if (s.is_tuner !== undefined && s.is_tuner !== isTuner) {
                isTuner = s.is_tuner;
                tunerControls.classList.toggle('show', isTuner);
                trackSection.style.display = isTuner ? 'none' : (currentTotalTracks > 0 ? 'block' : 'none');

                $('trkLabel').textContent = isTuner ? 'PRESET' : 'TRACKS';
                $('mediaLabel').textContent = isTuner ? 'BAND' : 'MEDIA';

                if (connected) updateConnection(true);
            }

            // Mode sync
            if (s.play_mode) {
                modeBtns.forEach(b => b.classList.toggle('active', b.dataset.mode === s.play_mode));
            }

            // Device sync
            if (s.device) {
                deviceBtns.forEach(b => b.classList.toggle('active', b.dataset.device === s.device));
            }

            // Error / Caution display
            const errors = [];
            if (s.error_status && s.error_status.has_error) {
                errors.push(...s.error_status.errors.map(e => e.replace('_', ' ')));
            }
            if (s.caution_status && s.caution_status.has_caution) {
                errors.push(...s.caution_status.cautions.map(c => c.replace('_', ' ')));
            }
            if (errors.length) {
                errorBanner.textContent = '⚠ ' + errors.join(' · ');
                errorBanner.classList.add('show');
            } else {
                errorBanner.classList.remove('show');
            }
        }

        // ── Socket events ──
        socket.on('connect', () => socket.emit('request_status'));
        socket.on('disconnect', () => {});
        socket.on('status_update', (s) => updateDisplay(s));

        // ── Initial load ──
        fetch('/api/status')
            .then(r => r.json())
            .then(d => {
                updateConnection(d.connected);
                if (d.connected && d.status) updateDisplay(d.status);
            })
            .catch(e => console.error('Init failed:', e));

        // ── PWA service worker ──
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker
                    .register('/service-worker.js', { scope: '/' })
                    .catch(e => console.warn('SW registration failed:', e));
            });
        }
    </script>
</body>
</html>
